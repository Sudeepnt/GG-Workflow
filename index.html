<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gattabara Games Workflow</title>
    <link rel="stylesheet" href="styles.css?v=20260711-gg2" />
  </head>
  <body class="app-booting">
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <img class="login-logo" src="gattabara-logo.png?v=20260711-gg2" alt="Gattabara Games" />
        <form id="login-form" class="login-form" autocomplete="off">
          <label class="login-field">
            <span>Password</span>
            <span class="login-password-wrap">
              <input id="login-password" name="password" type="password" placeholder="Enter password" required />
              <button id="login-password-toggle" class="login-password-toggle" type="button" aria-label="Show password" aria-pressed="false">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M1.5 12s3.8-6 10.5-6 10.5 6 10.5 6-3.8 6-10.5 6S1.5 12 1.5 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                  <circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="1.8" />
                </svg>
              </button>
            </span>
          </label>
          <button class="login-button" type="submit">Login</button>
          <p id="login-error" class="login-error" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <div class="app-shell">
      <main class="layout">
        <aside class="sidebar">
          <div class="sidebar-shell">
            <div class="sidebar-brand">
              <div class="sidebar-brand-row">
                <button id="home-button" class="sidebar-title sidebar-home-button" type="button" aria-label="Go to dashboard">
                  <img class="sidebar-logo" src="gattabara-logo.png?v=20260711-gg2" alt="Gattabara Games" />
                </button>
                <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Collapse sidebar" aria-expanded="true"></button>
              </div>
            </div>

            <nav id="sidebar-nav" class="sidebar-nav" aria-label="Primary"></nav>
            <div id="sidebar-footer" class="sidebar-footer"></div>
          </div>
        </aside>

        <button id="mobile-nav-scrim" class="mobile-nav-scrim" type="button" aria-label="Dismiss navigation overlay"></button>

        <section class="content">
          <header class="mobile-topbar">
            <button id="mobile-nav-button" class="mobile-nav-button" type="button" aria-label="Open navigation" aria-expanded="false"></button>
            <div class="mobile-topbar-copy">
              <p class="mobile-topbar-eyebrow">Gattabara Games Workflow</p>
              <h1 id="mobile-nav-title" class="mobile-topbar-title">Dashboard</h1>
            </div>
          </header>
          <section id="hero-panel" class="panel hero-panel"></section>
        </section>
      </main>
    </div>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
          <div>
            <h2 id="modal-title">Table</h2>
            <p id="modal-subtitle">Form</p>
          </div>
          <button id="close-button" class="close-button" type="button" aria-label="Close">×</button>
        </div>
        <form class="form" autocomplete="off">
          <div id="form" class="form-grid"></div>
          <p id="form-message" class="form-message" aria-live="polite"></p>
          <div class="form-actions">
            <button id="save-button" class="save-button" type="submit">Save</button>
          </div>
        </form>
      </div>
    </div>

    <div id="confirm-modal" class="modal confirm-modal" aria-hidden="true">
      <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
        <div class="confirm-head">
          <h2 id="confirm-title">Delete item?</h2>
        </div>
        <p id="confirm-message">This action cannot be undone.</p>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="confirm-cancel" type="button">Cancel</button>
          <button id="confirm-delete" class="confirm-delete" type="button">Delete</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js"></script>
    <script src="config.js?v=20260711-gg2"></script>
    <script src="app.js?v=20260711-gg2" defer></script>
  </body>
</html>
